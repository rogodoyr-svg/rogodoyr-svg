<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style><![CDATA[
      .bg { fill: #0a0612; }
      .orb-slow { animation: drift1 18s ease-in-out infinite; transform-origin: center; }
      .orb-med  { animation: drift2 12s ease-in-out infinite; transform-origin: center; }
      .orb-fast { animation: drift3 9s  ease-in-out infinite; transform-origin: center; }

      .ring1 { animation: spin3d 14s linear infinite; transform-origin: 400px 150px; }
      .ring2 { animation: spin3dRev 18s linear infinite; transform-origin: 400px 150px; }
      .ring3 { animation: spin3d 22s linear infinite; transform-origin: 400px 150px; }

      .hex { animation: spinHex 20s linear infinite; transform-origin: 400px 150px; }
      .hex-inner { animation: spinHexRev 12s linear infinite; transform-origin: 400px 150px; }

      .particle { animation: float 6s ease-in-out infinite; }
      .p1 { animation-delay: 0s; }
      .p2 { animation-delay: -1.2s; }
      .p3 { animation-delay: -2.4s; }
      .p4 { animation-delay: -3.6s; }
      .p5 { animation-delay: -4.8s; }

      .scan { animation: scan 5s ease-in-out infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: 400px 150px; }

      .title {
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 300;
        letter-spacing: 6px;
        fill: #f5d9ff;
        filter: url(#glow);
      }
      .subtitle {
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 400;
        letter-spacing: 3px;
        fill: #7dffb8;
        filter: url(#glow2);
      }
      .micro {
        font-family: 'Courier New', monospace;
        font-size: 9px;
        letter-spacing: 2px;
        fill: #ff8fd1;
        opacity: 0.7;
      }
      .title-anim { animation: titleFade 6s ease-in-out infinite; }
      .sub-anim   { animation: subFade 6s ease-in-out infinite; animation-delay: -3s; }

      @keyframes drift1 {
        0%,100% { transform: translate(0,0) scale(1); }
        50%     { transform: translate(30px,-20px) scale(1.1); }
      }
      @keyframes drift2 {
        0%,100% { transform: translate(0,0) scale(1); }
        50%     { transform: translate(-40px,25px) scale(1.15); }
      }
      @keyframes drift3 {
        0%,100% { transform: translate(0,0) scale(1); }
        50%     { transform: translate(20px,30px) scale(0.9); }
      }
      @keyframes spin3d {
        0%   { transform: rotate(0deg)   scaleX(1); }
        25%  { transform: rotate(90deg)  scaleX(0.3); }
        50%  { transform: rotate(180deg) scaleX(1); }
        75%  { transform: rotate(270deg) scaleX(0.3); }
        100% { transform: rotate(360deg) scaleX(1); }
      }
      @keyframes spin3dRev {
        0%   { transform: rotate(360deg) scaleX(1); }
        25%  { transform: rotate(270deg) scaleX(0.4); }
        50%  { transform: rotate(180deg) scaleX(1); }
        75%  { transform: rotate(90deg)  scaleX(0.4); }
        100% { transform: rotate(0deg)   scaleX(1); }
      }
      @keyframes spinHex {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes spinHexRev {
        from { transform: rotate(360deg); }
        to   { transform: rotate(0deg); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0) translateX(0); opacity: 0.8; }
        50%     { transform: translateY(-15px) translateX(8px); opacity: 1; }
      }
      @keyframes scan {
        0%   { transform: translateY(-150px); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(150px); opacity: 0; }
      }
      @keyframes pulse {
        0%,100% { transform: scale(1); opacity: 0.5; }
        50%     { transform: scale(1.08); opacity: 0.9; }
      }
      @keyframes titleFade {
        0%,100% { opacity: 0.85; }
        50%     { opacity: 1; }
      }
      @keyframes subFade {
        0%,100% { opacity: 0.7; }
        50%     { opacity: 1; }
      }
    ]]></style>

    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff2e93" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#8a1c5c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#6a1b9a" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#3a0a5c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00ffa3" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#0a7a5c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00b8ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#0a3a7a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#b30059" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ff4fbf"/>
      <stop offset="50%" stop-color="#a020f0"/>
      <stop offset="100%" stop-color="#00ffa3"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#7dffb8"/>
      <stop offset="100%" stop-color="#ff6ec7"/>
    </linearGradient>
    <linearGradient id="ringGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ff006e"/>
      <stop offset="100%" stop-color="#8338ec"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ff6ec7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ffa3" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="medBlur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- Fondo -->
  <rect class="bg" width="800" height="300"/>

  <!-- Capa profunda: orbes difuminados -->
  <g filter="url(#softBlur)">
    <circle class="orb-slow" cx="150" cy="90"  r="140" fill="url(#g1)"/>
    <circle class="orb-med"  cx="650" cy="220" r="160" fill="url(#g2)"/>
    <circle class="orb-fast" cx="700" cy="60"  r="110" fill="url(#g3)"/>
    <circle class="orb-slow" cx="100" cy="240" r="120" fill="url(#g4)"/>
    <circle class="orb-med"  cx="400" cy="150" r="180" fill="url(#g5)"/>
  </g>

  <!-- Capa media: anillos orbitales (simulación 3D con scaleX) -->
  <g opacity="0.85">
    <ellipse class="ring1" cx="400" cy="150" rx="260" ry="70"
             fill="none" stroke="url(#ringGrad1)" stroke-width="1.2"
             stroke-dasharray="4 6"/>
    <ellipse class="ring2" cx="400" cy="150" rx="210" ry="55"
             fill="none" stroke="url(#ringGrad2)" stroke-width="1"
             stroke-dasharray="2 4"/>
    <ellipse class="ring3" cx="400" cy="150" rx="320" ry="90"
             fill="none" stroke="url(#ringGrad3)" stroke-width="0.8"
             stroke-dasharray="1 8"/>
  </g>

  <!-- Hexágono central con rotación -->
  <g class="pulse">
    <g class="hex">
      <polygon points="400,95 447.6,122.5 447.6,177.5 400,205 352.4,177.5 352.4,122.5"
               fill="none" stroke="url(#hexGrad)" stroke-width="1.5" opacity="0.9"/>
    </g>
    <g class="hex-inner">
      <polygon points="400,115 430.3,132.5 430.3,167.5 400,185 369.7,167.5 369.7,132.5"
               fill="none" stroke="#00ffa3" stroke-width="0.8" opacity="0.7"/>
    </g>
    <circle cx="400" cy="150" r="3" fill="#ffffff" filter="url(#glow)"/>
  </g>

  <!-- Partículas flotantes -->
  <g filter="url(#glow)">
    <circle class="particle p1" cx="120" cy="80"  r="1.8" fill="#ff6ec7"/>
    <circle class="particle p2" cx="680" cy="100" r="1.5" fill="#7dffb8"/>
    <circle class="particle p3" cx="200" cy="220" r="2"   fill="#00e5ff"/>
    <circle class="particle p4" cx="600" cy="240" r="1.6" fill="#ff4fbf"/>
    <circle class="particle p5" cx="520" cy="60"  r="1.4" fill="#a020f0"/>
    <circle class="particle p1" cx="300" cy="50"  r="1.2" fill="#ffffff"/>
    <circle class="particle p3" cx="740" cy="180" r="1.3" fill="#ff006e"/>
    <circle class="particle p2" cx="60"  cy="160" r="1.5" fill="#00ffa3"/>
  </g>

  <!-- Línea de escaneo -->
  <g class="scan" opacity="0.5">
    <line x1="0" y1="150" x2="800" y2="150" stroke="url(#ringGrad2)" stroke-width="0.5"/>
  </g>

  <!-- Textos -->
  <g class="title-anim">
    <text class="title" x="400" y="155" text-anchor="middle" font-size="22">
      DEVELOPER &amp; ENGINEER
    </text>
  </g>
  <g class="sub-anim">
    <text class="subtitle" x="400" y="180" text-anchor="middle" font-size="12">
      IN PROGRESS  ·  TECH EXPLORER
    </text>
  </g>

  <!-- Micro-textos decorativos en esquinas -->
  <text class="micro" x="20"  y="25">[ sys.init ]</text>
  <text class="micro" x="20"  y="285">v2.4.1 // online</text>
  <text class="micro" x="780" y="25"  text-anchor="end">&lt;/code&gt;</text>
  <text class="micro" x="780" y="285" text-anchor="end">render:60fps</text>

  <!-- Marcos sutiles -->
  <rect x="10" y="10" width="780" height="280" fill="none"
        stroke="#ff6ec7" stroke-width="0.3" opacity="0.25"/>
  <rect x="15" y="15" width="770" height="270" fill="none"
        stroke="#00ffa3" stroke-width="0.3" opacity="0.2"/>
</svg>
