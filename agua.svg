<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Gradiente principal de agua -->
    <linearGradient id="aguaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0077b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#03045e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente de brillo -->
    <radialGradient id="brilloGrad" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#90e0ef;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0" />
    </radialGradient>
    
    <!-- Gradiente de texto -->
    <linearGradient id="textoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8" />
      <stop offset="50%" style="stop-color:#48cae4" />
      <stop offset="100%" style="stop-color:#90e0ef" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fluir {
      0% { 
        d: path("M0,100 Q100,60 200,80 Q300,100 400,70 Q500,40 600,80 Q700,120 800,90 L800,200 L0,200 Z");
      }
      25% { 
        d: path("M0,100 Q100,120 200,90 Q300,60 400,80 Q500,110 600,70 Q700,50 800,100 L800,200 L0,200 Z");
      }
      50% { 
        d: path("M0,100 Q100,70 200,100 Q300,130 400,90 Q500,60 600,100 Q700,140 800,80 L800,200 L0,200 Z");
      }
      75% { 
        d: path("M0,100 Q100,130 200,80 Q300,50 400,100 Q500,140 600,80 Q700,100 800,110 L800,200 L0,200 Z");
      }
      100% { 
        d: path("M0,100 Q100,60 200,80 Q300,100 400,70 Q500,40 600,80 Q700,120 800,90 L800,200 L0,200 Z");
      }
    }
    
    @keyframes gota {
      0% { 
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { 
        transform: translateY(80px) scale(0.8);
        opacity: 0;
      }
    }
    
    @keyframes ondaCirculo {
      0% {
        r: 5;
        opacity: 0.8;
      }
      100% {
        r: 60;
        opacity: 0;
      }
    }
    
    @keyframes brilloIntenso {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    
    @keyframes latir {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .fondo-agua {
      animation: fluir 6s ease-in-out infinite;
      fill: url(#aguaGrad);
    }
    
    .brillo-superior {
      animation: brilloIntenso 3s ease-in-out infinite;
      fill: url(#brilloGrad);
    }
    
    .onda-efecto {
      fill: none;
      stroke: #48cae4;
      stroke-width: 2;
      animation: ondaCirculo 3s ease-out infinite;
      transform-origin: 650px 100px;
    }
    
    .onda-efecto:nth-child(2) {
      animation-delay: 1s;
    }
    
    .onda-efecto:nth-child(3) {
      animation-delay: 2s;
    }
    
    .gota-animada {
      animation: gota 2.5s ease-in infinite;
    }
    
    .gota-animada:nth-child(1) { animation-delay: 0s; }
    .gota-animada:nth-child(2) { animation-delay: 0.8s; }
    .gota-animada:nth-child(3) { animation-delay: 1.6s; }
    
    .texto-principal {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 42px;
      font-weight: 700;
      fill: url(#textoGrad);
      filter: drop-shadow(0 0 20px rgba(0, 180, 216, 0.3));
    }
    
    .texto-sub {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      fill: #90e0ef;
      opacity: 0.7;
      letter-spacing: 4px;
    }
    
    .texto-gx {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 22px;
      font-weight: 300;
      fill: #48cae4;
      opacity: 0.6;
    }
    
    .icono-tech {
      animation: latir 2s ease-in-out infinite;
      fill: #00b4d8;
    }
  </style>
  
  <!-- Fondo con efecto de agua -->
  <path class="fondo-agua" />
  
  <!-- Efecto de brillo en la superficie -->
  <ellipse class="brillo-superior" cx="300" cy="70" rx="200" ry="30" />
  
  <!-- Círculos de onda (efecto de gota) -->
  <circle class="onda-efecto" cx="650" cy="100" r="5" />
  <circle class="onda-efecto" cx="650" cy="100" r="5" />
  <circle class="onda-efecto" cx="650" cy="100" r="5" />
  
  <!-- Gotas cayendo -->
  <g>
    <path class="gota-animada" d="M120,20 Q125,40 120,60 Q115,40 120,20Z" fill="#90e0ef" opacity="0.8" />
    <path class="gota-animada" d="M180,10 Q185,30 180,50 Q175,30 180,10Z" fill="#90e0ef" opacity="0.8" />
    <path class="gota-animada" d="M150,30 Q155,50 150,70 Q145,50 150,30Z" fill="#90e0ef" opacity="0.8" />
  </g>
  
  <!-- Texto principal -->
  <text class="texto-principal" x="230" y="110">Rodrigo</text>
  <text class="texto-gx" x="570" y="110">_GX</text>
  
  <!-- Subtítulo -->
  <text class="texto-sub" x="280" y="145">DEVELOPER & CREATOR</text>
  
  <!-- Pequeños iconos decorativos (código/brackets) -->
  <g class="icono-tech">
    <text x="210" y="165" font-family="monospace" font-size="14" fill="#00b4d8">&lt;/&gt;</text>
  </g>
  
  <!-- Partículas pequeñas (como burbujas) -->
  <circle cx="50" cy="150" r="3" fill="#90e0ef" opacity="0.3">
    <animate attributeName="cy" values="150;130;150" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="730" cy="160" r="2" fill="#90e0ef" opacity="0.2">
    <animate attributeName="cy" values="160;140;160" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="170" r="4" fill="#90e0ef" opacity="0.15">
    <animate attributeName="cy" values="170;145;170" dur="3.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.5s" repeatCount="indefinite" />
  </circle>
</svg>
