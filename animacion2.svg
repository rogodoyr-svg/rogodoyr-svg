<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .orb, .core, .core-bg, .p1, .p2, .p3, .p4, .p5, .p6 {
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes spin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.9; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
    @keyframes pulse-bg { 0%, 100% { opacity: 0.2; transform: scale(1.5); } 50% { opacity: 0.6; transform: scale(1.9); } }
    @keyframes float1 { 0% { transform: translateY(0px) scale(1); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-40px) scale(0.4); opacity: 0; } }
    @keyframes float2 { 0% { transform: translateY(0px) scale(1); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-60px) scale(0.4); opacity: 0; } }
    @keyframes flow { to { stroke-dashoffset: -200; } }
    @keyframes text-pulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }

    .orb1 { animation: spin1 10s linear infinite; }
    .orb2 { animation: spin2 15s linear infinite; }
    .orb3 { animation: spin1 20s linear infinite; }
    .core { animation: pulse 4s ease-in-out infinite; }
    .core-bg { animation: pulse-bg 4s ease-in-out infinite; }
    .p1 { animation: float1 4s ease-in-out infinite; }
    .p2 { animation: float2 6s ease-in-out infinite; animation-delay: 1s; }
    .p3 { animation: float1 5s ease-in-out infinite; animation-delay: 2s; }
    .p4 { animation: float2 7s ease-in-out infinite; animation-delay: 0.5s; }
    .p5 { animation: float1 8s ease-in-out infinite; animation-delay: 3s; }
    .p6 { animation: float2 5.5s ease-in-out infinite; animation-delay: 1.5s; }
    .text-main { animation: text-pulse 4s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 10 15; animation: flow 5s linear infinite; }
  </style>

  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2ea"/>
      <stop offset="50%" stop-color="#ff00d4"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2ea"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0, 242, 234, 0.1)"/>
      <stop offset="50%" stop-color="rgba(255, 0, 212, 0.8)"/>
      <stop offset="100%" stop-color="rgba(112, 0, 255, 0.1)"/>
    </linearGradient>
  </defs>

  <!-- Background ambient shapes (simulated glow with opacity and scaling for depth) -->
  <circle cx="200" cy="100" r="80" fill="rgba(0, 242, 234, 0.05)" class="orb2"/>
  <circle cx="200" cy="100" r="50" fill="rgba(0, 242, 234, 0.1)" class="orb1"/>
  <circle cx="650" cy="200" r="100" fill="rgba(255, 0, 212, 0.05)" class="orb1"/>
  <circle cx="650" cy="200" r="70" fill="rgba(255, 0, 212, 0.1)" class="orb2"/>
  <circle cx="400" cy="150" r="120" fill="rgba(112, 0, 255, 0.05)" class="orb3"/>

  <!-- Animated Tech Core (Left) -->
  <g transform="translate(250, 150)">
    <!-- Orbits -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="rgba(0, 242, 234, 0.6)" stroke-width="1.5" stroke-dasharray="10 10" class="orb1"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="rgba(255, 0, 212, 0.5)" stroke-width="1.5" stroke-dasharray="20 15" class="orb2"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="rgba(112, 0, 255, 0.4)" stroke-width="1.5" stroke-dasharray="5 20" class="orb3"/>
    
    <!-- Core Shape with simulated neon glow -->
    <polygon points="0,-25 25,0 0,25 -25,0" fill="rgba(0, 242, 234, 0.3)" class="core-bg"/>
    <polygon points="0,-20 20,0 0,20 -20,0" fill="url(#coreGrad)" class="core"/>
    
    <!-- Core Particles -->
    <circle cx="-30" cy="20" r="3" fill="#00f2ea" class="p1"/>
    <circle cx="40" cy="-15" r="4" fill="#ff00d4" class="p2"/>
    <circle cx="-10" cy="-40" r="2" fill="#7000ff" class="p3"/>
    <circle cx="20" cy="35" r="3" fill="#00f2ea" class="p4"/>
    <circle cx="60" cy="10" r="2" fill="#ff00d4" class="p5"/>
    <circle cx="-50" cy="-10" r="2.5" fill="#00f2ea" class="p6"/>
  </g>

  <!-- Typography (Right) -->
  <g transform="translate(400, 0)">
    <!-- Text with outline and fill for a modern futuristic look -->
    <text x="0" y="140" font-size="48" font-weight="800" letter-spacing="2" class="text-main" fill="none" stroke="url(#textGrad)" stroke-width="1">DEVELOPER</text>
    <text x="0" y="140" font-size="48" font-weight="800" letter-spacing="2" class="text-main" fill="url(#textGrad)">DEVELOPER</text>
    
    <text x="0" y="175" font-size="18" font-weight="500" letter-spacing="3" fill="rgba(255, 255, 255, 0.7)">// CREATIVE CODER & UI ENGINEER</text>
    
    <!-- Animated flowing underline -->
    <path d="M0 200 L350 200" fill="none" stroke="url(#lineGrad)" stroke-width="2" class="flow-line"/>
  </g>

  <!-- Floating particles around text for ambient depth -->
  <circle cx="450" cy="100" r="2" fill="#00f2ea" class="p3"/>
  <circle cx="750" cy="150" r="3" fill="#ff00d4" class="p4"/>
  <circle cx="380" cy="230" r="2" fill="#7000ff" class="p5"/>
  <circle cx="600" cy="90" r="2.5" fill="#00f2ea" class="p6"/>
  <circle cx="680" cy="250" r="2" fill="#ff00d4" class="p1"/>
</svg>
